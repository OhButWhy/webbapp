services:
  - type: web
    name: stylee-backend
    runtime: python
    pythonVersion: "3.12"
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    routes:
      - path: "/*"
        matchType: "PATH_PREFIX"
