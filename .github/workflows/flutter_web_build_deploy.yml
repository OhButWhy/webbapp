name: Build and Deploy Flutter Web (GitHub Pages)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Create .env for build
        run: |
          echo "STYLEE_BACKEND_URL=https://webbapp-yicy.onrender.com" > stylee_app/.env
          cat stylee_app/.env

      - name: Install dependencies
        run: |
          cd stylee_app
          flutter pub get
          flutter pub upgrade --major-versions

      - name: Build Flutter web
        run: |
          cd stylee_app
          flutter build web --release --verbose
        continue-on-error: true

      - name: Check build output
        run: |
          ls -la stylee_app/build/web 2>/dev/null || echo "Build directory not found"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./stylee_app/build/web
          user_name: github-actions
          user_email: github-actions@users.noreply.github.com
