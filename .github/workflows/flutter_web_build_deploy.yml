name: Build and Deploy Flutter Web (GitHub Pages)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Tool versions
        run: |
          flutter config --no-analytics
          flutter --version
          dart --version

      - name: Create .env for build
        run: |
          echo "STYLEE_BACKEND_URL=https://webapp-6765.onrender.com" > stylee_app/.env
          cat stylee_app/.env

      - name: Install dependencies
        run: |
          cd stylee_app
          flutter pub get

      - name: Build Flutter web
        run: |
          cd stylee_app
          flutter build web --release --verbose --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./stylee_app/build/web
          user_name: github-actions
          user_email: github-actions@users.noreply.github.com
